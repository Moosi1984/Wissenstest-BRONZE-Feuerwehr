<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wissenstest</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.header{width:100%;height:140px}
.header img{width:100%;height:100%;object-fit:cover}
.content{background:#f2f2f2;padding:15px;min-height:100vh}

.card{display:flex;align-items:center;background:white;border-radius:20px;padding:15px;margin-top:15px;box-shadow:0 4px 10px rgba(0,0,0,0.05);cursor:pointer}
.card img{width:70px;height:70px;border-radius:16px;margin-right:15px}

.quiz-box{background:white;border-radius:20px;padding:20px;box-shadow:0 4px 10px rgba(0,0,0,0.05)}

.btn{width:100%;padding:15px;border:none;border-radius:14px;margin-top:10px;font-size:18px;font-weight:600;cursor:pointer}
.btn-back{background:#555;color:white}
.btn-next{background:linear-gradient(90deg,#ff3b3b,#ff9800);color:white}

.answer{background:#eee;padding:14px;border-radius:12px;margin:6px 0;cursor:pointer}
.correct{background:#4caf50!important;color:white}
.wrong{background:#f44336!important;color:white}
.selected{border:2px solid #ff3b3b}

.quiz-img{width:140px;display:block;margin:15px auto}
.knoten-img{width:100%;max-width:350px;display:block;margin:20px auto}
</style>
</head>

<body>

<div id="app">Lade...</div>

<script>

const state = {
    modus:"",
    fragen:[],
    index:0,
    punkte:0,
    auswahl:[],
    beantwortet:false,
    currentAnswers:[]
};

let alleFragen=[],dienstgrade=[],armaturen=[],armaturenBilder=[],knoten=[];

function render(html){
    document.getElementById("app").innerHTML = html;
}

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
    return array;
}

async function load(file){
    try{
        const res = await fetch(file);
        return await res.json();
    }catch{
        console.error("Fehler beim Laden:", file);
        return [];
    }
}

async function start(){
    alleFragen = await load("fragen.json");
    dienstgrade = await load("dienstgrade.json");
    armaturen = await load("armaturen.json");
    armaturenBilder = await load("armaturen_bilder.json");
    knoten = await load("knoten.json");

    render(`
    <div class="header"><img src="banner.png"></div>
    <div class="content" id="menu"></div>
    `);

    const menu = document.getElementById("menu");

    function createCard(img,title,count,fn){
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML = `
            <img src="${img}">
            <div><b>${title}</b><br>${count} ${title==="Knoten"?"Knoten":"Fragen"}</div>
        `;
        card.addEventListener("click", fn);
        return card;
    }

    menu.appendChild(createCard("dienstgrade.png","Dienstgrade",dienstgrade.length,startDienstgrade));
    menu.appendChild(createCard("theorie.png","Theorie",alleFragen.length,startTheorie));
    menu.appendChild(createCard("armaturen.png","Armaturen Theorie",armaturen.length,startArmaturen));
    menu.appendChild(createCard("armatur_erkennen.png","Armaturen erkennen",armaturenBilder.length,startArmaturenBilder));
    menu.appendChild(createCard("knoten.png","Knoten",knoten.length,startKnoten));
}

/* QUIZ */

function reset(){
    state.index=0;
    state.punkte=0;
}

function startTheorie(){
    state.modus="theorie";
    state.fragen=shuffle([...alleFragen]);
    reset();
    showQuiz();
}

function startArmaturen(){
    state.modus="armaturen";
    state.fragen=shuffle([...armaturen]);
    reset();
    showQuiz();
}

function showQuiz(){
    state.auswahl=[];
    state.beantwortet=false;

    let f=state.fragen[state.index];

    state.currentAnswers = shuffle(
        f.antworten.map((a,i)=>({text:a,index:i}))
    );

    render(`
    <div class="content">
        <div class="quiz-box">
            <button class="btn btn-back" id="backBtn">Zur Startseite</button>
            <h3>${state.index+1}/${state.fragen.length}</h3>
            <h3>${f.frage}</h3>
            <div id="answers"></div>
            <button class="btn btn-next" id="mainBtn">Bestätigen</button>
        </div>
    </div>`);

    document.getElementById("backBtn").onclick = start;

    const answersDiv = document.getElementById("answers");

    state.currentAnswers.forEach((a,i)=>{
        const el=document.createElement("div");
        el.className="answer";
        el.textContent=a.text;

        el.addEventListener("click", ()=>{
            if(state.beantwortet) return;

            if(state.auswahl.includes(i)){
                state.auswahl = state.auswahl.filter(x=>x!==i);
                el.classList.remove("selected");
            }else{
                state.auswahl.push(i);
                el.classList.add("selected");
            }
        });

        answersDiv.appendChild(el);
    });

    document.getElementById("mainBtn").onclick = handleButton;
}

function handleButton(){
    if(!state.beantwortet){
        check();
        document.getElementById("mainBtn").innerText="Weiter";
    }else{
        next();
    }
}

function check(){
    state.beantwortet=true;
    let f=state.fragen[state.index];

    document.querySelectorAll(".answer").forEach((el,i)=>{
        let orig=state.currentAnswers[i].index;

        if(f.richtig.includes(orig)) el.classList.add("correct");
        if(state.auswahl.includes(i) && !f.richtig.includes(orig)) el.classList.add("wrong");
    });

    if(
        state.auswahl.length===f.richtig.length &&
        state.auswahl.every(i=>f.richtig.includes(state.currentAnswers[i].index))
    ){
        state.punkte++;
    }

    document.querySelector(".content").insertAdjacentHTML("beforeend",
        `<div class="quiz-box" style="margin-top:10px">
            <h4>Erklärung</h4><p>${f.erklaerung}</p>
        </div>`);
}

/* BILDER */

function startDienstgrade(){
    state.modus="dienst";
    state.fragen=shuffle([...dienstgrade]);
    reset();
    showBild();
}

function startArmaturenBilder(){
    state.modus="bild";
    state.fragen=shuffle([...armaturenBilder]);
    reset();
    showBild();
}

function showBild(){
    state.auswahl=[];
    state.beantwortet=false;

    let f=state.fragen[state.index];

    let antworten=shuffle(state.fragen.map(x=>x.name)).slice(0,4);

    if(!antworten.includes(f.name)){
        antworten[0]=f.name;
        antworten=shuffle(antworten);
    }

    state.currentAnswers=antworten;

    render(`
    <div class="content">
        <div class="quiz-box">
            <button class="btn btn-back" id="backBtn">Zur Startseite</button>
            <h3>${state.index+1}/${state.fragen.length}</h3>
            <h3>${state.modus==="dienst"?"Welcher Dienstgrad ist das?":"Welche Armatur ist das?"}</h3>
            <img src="${f.bild}" class="quiz-img">
            <div id="answers"></div>
            <button class="btn btn-next" id="mainBtn">Bestätigen</button>
        </div>
    </div>`);

    document.getElementById("backBtn").onclick = start;

    const answersDiv=document.getElementById("answers");

    state.currentAnswers.forEach((a,i)=>{
        const el=document.createElement("div");
        el.className="answer";
        el.textContent=a;

        el.addEventListener("click", ()=>{
            if(state.beantwortet) return;

            document.querySelectorAll(".answer").forEach(a=>a.classList.remove("selected"));
            state.auswahl=[i];
            el.classList.add("selected");
        });

        answersDiv.appendChild(el);
    });

    document.getElementById("mainBtn").onclick = handleButtonBild;
}

function handleButtonBild(){
    if(!state.beantwortet){
        checkBild();
        document.getElementById("mainBtn").innerText="Weiter";
    }else{
        next();
    }
}

function checkBild(){
    state.beantwortet=true;
    let f=state.fragen[state.index];

    document.querySelectorAll(".answer").forEach((el,i)=>{
        if(state.currentAnswers[i]===f.name) el.classList.add("correct");
        if(state.auswahl.includes(i) && state.currentAnswers[i]!==f.name) el.classList.add("wrong");
    });

    if(state.auswahl.length && state.currentAnswers[state.auswahl[0]]===f.name){
        state.punkte++;
    }

    if(state.modus!=="dienst"){
        document.querySelector(".content").insertAdjacentHTML("beforeend",
            `<div class="quiz-box" style="margin-top:10px">
                <h4>Erklärung</h4><p>${f.erklaerung}</p>
            </div>`);
    }
}

/* NEXT */

function next(){
    state.index++;

    if(state.index>=state.fragen.length){
        render(`
        <div class="content">
            <div class="quiz-box">
                <h2>Ergebnis</h2>
                <p>${state.punkte} / ${state.fragen.length}</p>
                <button class="btn btn-next" id="restart">Zur Startseite</button>
            </div>
        </div>`);

        document.getElementById("restart").onclick = start;
    } else {
        if(state.modus==="theorie"||state.modus==="armaturen"){
            showQuiz();
        } else {
            showBild();
        }
    }
}

/* KNOTEN */

let knotenIndex=0,knotenStep=0;

function startKnoten(){
    render(`<div class="content">
        <button class="btn btn-back" id="backBtn">Zur Startseite</button>
        <div id="knotenList"></div>
    </div>`);

    document.getElementById("backBtn").onclick=start;

    const list=document.getElementById("knotenList");

    knoten.forEach((k,i)=>{
        const el=document.createElement("div");
        el.className="card";
        el.innerHTML=`<b>${k.name}</b>`;
        el.onclick=()=>showKnoten(i);
        list.appendChild(el);
    });
}

function showKnoten(i){
    knotenIndex=i;
    knotenStep=0;
    renderKnoten();
}

function renderKnoten(){
    let k=knoten[knotenIndex];

    render(`
    <div class="content">
        <div class="quiz-box">
            <button class="btn btn-back" id="backBtn">Zurück</button>
            <h2>${k.name}</h2>
            <h4>Schritt ${knotenStep+1} von ${k.bilder.length}</h4>
            <img src="${k.bilder[knotenStep]}" class="knoten-img">
            <button class="btn btn-next" id="nextBtn">
                ${knotenStep===k.bilder.length-1?"Erklärung anzeigen":"Weiter"}
            </button>
        </div>
    </div>`);

    document.getElementById("backBtn").onclick=startKnoten;
    document.getElementById("nextBtn").onclick=nextKnoten;
}

function nextKnoten(){
    let k=knoten[knotenIndex];

    if(knotenStep<k.bilder.length-1){
        knotenStep++;
        renderKnoten();
    }else{
        render(`
        <div class="content">
            <div class="quiz-box">
                <button class="btn btn-back" id="backBtn">Zurück</button>
                <h2>${k.name}</h2>
                <p>${k.erklaerung}</p>
                <button class="btn btn-next" id="again">Nochmal</button>
            </div>
        </div>`);

        document.getElementById("backBtn").onclick=startKnoten;
        document.getElementById("again").onclick=()=>showKnoten(knotenIndex);
    }
}

start();

</script>

</body>
</html>
